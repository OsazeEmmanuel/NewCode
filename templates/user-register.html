{% extends 'landing.html' %}
{% block body %}

<div class="container">
    <div class="row">
        <div class="col-md-4 offset-4">
            <form method="POST" class="card shadow" enctype="multipart/form-data">
    <h1 class="h3 mb-3 fw-normal">Login</h1>
    <div class="form-floating">
        <input type="text" class="form-control" name="name" placeholder="Enter name">
        <label>Name</label>
    </div>
    <div class="form-floating">
        <input type="email" class="form-control" name="email" placeholder="name@example.com">
        <label>Email address</label>
    </div>
    <div class="form-floating"> <input type="password" name="password" class="form-control" placeholder="Password">
        <label>Password</label>
    </div>
    <div class="form-floating"> <input type="password" name="confirm_password" class="form-control" placeholder="Password">
        <label>Password</label>
    </div>
    <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
        <label class="form-check-label" for="checkDefault">Remember me</label>
    </div>
    <button class="btn btn-success w-100 py-2" type="submit">Register</button>
    <p class="mt-5 mb-3 text-body-secondary">© 2025</p>
</form>

        </div>
    </div>

</div>

{% endblock %}
