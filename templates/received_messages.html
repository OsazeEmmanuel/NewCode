{% extends "landing.html" %}

{% block body %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-3">
            <div class="card">
                <div class="card-header bg-secondary">
                    <h4>Booked Appointment List</h4>
                </div>
                {% for message in messages %}
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            {{message.appointment_name.users.name}}
                        </div>
                        <div class="col-md-3">
                            {{message.message}}
                        </div>
                        <div class="col-md-3">
                            {{message.date}}
                        </div>
                    </div>

                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
